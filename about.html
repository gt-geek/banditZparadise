<!DOCTYPE html>
<html>
<head>
<title>About Debug</title>
<style>
html,body {margin:0;height:100%;background: url("landing_bg.jpg") center/cover fixed;}
#about-bg {position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.95);transform:translateY(100vh);transition:transform 1s;}
#about-bg.scrolled {transform:translateY(0);}
#about-text {position:relative;z-index:10;color:white;font-weight:bold;padding:4rem;max-width:900px;margin:2rem auto;font-size:1.3rem;line-height:1.7;text-align:center;opacity:0;transform:translateY(4rem);transition:all 1s 0.5s;}
#about-text.scrolled {opacity:1;transform:translateY(0);}
.navbar {position:fixed;top:20px;right:20px;z-index:100;}
.navbar a {color:white;margin-left:20px;text-decoration:none;}
</style>
</head>
<body>
<nav class="navbar">
<a href="index.html">Home</a><a href="rules.html">Rules</a><a href="discord.html">Discord</a>
</nav>
<section style="height:200vh;">
<div id="about-bg"></div>
<div id="about-text">
<h1>BANDITZPARADISE</h1>
<p>TEST: Scroll down – black BG should slide up!</p>
<p>If you see this + BG works = JS/CSS ok. If white/blank = landing_bg.jpg 404.</p>
</div>
</section>
<script>
let triggered=false;
window.onscroll=()=>{if(!triggered&&window.scrollY>200){document.getElementById('about-bg').classList.add('scrolled');document.getElementById('about-text').classList.add('scrolled');triggered=true;}}
</script>
</body>
</html>

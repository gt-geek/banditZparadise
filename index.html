<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>BanditZParadise</title>
    <link rel="stylesheet" href="./style.css">
</head>

<body class="home-page">

<nav class="navbar">
    <img src="logo.png" class="logo" alt="Logo">
    <div class="nav-links">
        <a href="index.html">HOME</a>
        <a href="about.html#start">ABOUT</a>
        <a href="rules.html">RULES</a>
        <a href="discord.html">DISCORD</a>
    </div>
</nav>

<main class="page-content">
    <!-- Hero-Bereich -->
    <div class="overlay">
        <div class="container">
            <h1>Welcome to BanditZParadise</h1>
            <p>Explore the server, read the rules, and join the community!</p>
            <a href="rules.html" class="btn">View Rules</a>
        </div>
    </div>

    <!-- SERVER-BEREICH -->
    <section class="server-section">
      <div class="server-container">
        <div class="server-card">
          <h3>BZP EU1 - Weekend raiding</h3>
          <p>IP: 89.163.146.97:2302</p>
          <p>Spieler: <span id="player-count">Lade...</span></p>
          <a href="steam://connect/89.163.146.97:2302" class="connect-btn">Connect</a>
        </div>
      </div>
    </section>

</main>

<footer class="footer">
    <div class="footer-links">
        <a href="terms.html" class="footer-btn">TERMS & CONDITIONS</a>
        <a href="imprint.html" class="footer-btn">IMPRINT</a>
        <a href="contact.html" class="footer-btn">CONTACT US</a>
    </div>
    <p class="footer-copy">© 2026 BanditZParadise. All rights reserved.</p>
</footer>
<script>
async function updatePlayerCount() {
    try {
        const res = await fetch('https://api.battlemetrics.com/servers/38448947');
        const data = await res.json();
        const players = data.data.attributes.players;
        const maxPlayers = data.data.attributes.maxPlayers;
        document.getElementById('player-count').textContent = players + '/' + maxPlayers;
    } catch (err) {
        console.error('Fehler beim Laden der Spielerzahl:', err);
        document.getElementById('player-count').textContent = '0/0';
    }
}

updatePlayerCount();
setInterval(updatePlayerCount, 15000);
</script>
</body>
</html>
